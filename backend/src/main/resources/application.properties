# ==========================================
# DataSentinel Backend — Configuration
# ==========================================

spring.application.name=DataSentinel

# Serveur sur le port 8081 (le front est sur 5173)
server.port=8081

# Base de données H2 embarquée (pas besoin d'installer MySQL/Postgres)
spring.datasource.url=jdbc:h2:mem:datasentinel
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Console H2 accessible sur http://localhost:8081/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# CORS — Autoriser le frontend React (Vite)
spring.web.cors.allowed-origins=http://localhost:5173,http://localhost:5174
